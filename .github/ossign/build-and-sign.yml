name: Build and Sign

# IMPORTANT: This workflow is NOT meant to run inside invoke-ai/launcher.
#
# It is the OSSign "Build and Sign" workflow that we maintain for our OSSign-hosted
# repository (https://github.com/OSSign/invoke-ai-launcher). Submit it there via pull
# request, per https://github.com/OSSign/template-repository/wiki/Your-OSSign-Workflow.
# See .github/ossign/README.md for the full setup.
#
# It is triggered through the OSSign API (api.ossign.org) by the `ossign/actions/
# workflow/dispatch` step in invoke-ai/launcher's .github/workflows/build-and-sign.yml.
# OSSign provisions the signing certificate as the OSSIGN_CONFIG secret in this repo's
# "OSSign" environment; the certificate never leaves OSSign's infrastructure.

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'The source branch or ref to build from'
        default: 'main'
        required: true
      release_name:
        description: 'The name for the release'
        required: true

env:
  SOURCE_REPOSITORY: 'invoke-ai/launcher'
  SOURCE_REPOSITORY_NAME: 'Invoke Community Edition'
  NODE_VERSION: '22'

jobs:
  build-and-sign:
    runs-on: windows-latest
    # The OSSIGN_CONFIG signing certificate is exposed through this environment.
    # Signing happens during packaging (see the build step below), so this single
    # job both builds and signs.
    environment: OSSign
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 30

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ github.event.inputs.source_branch }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download uv
        run: npm run download win

      # electron-builder invokes scripts/customSign.js for each Windows executable
      # (gated by ENABLE_SIGNING). customSign.js calls the OSSign CLI, which reads its
      # signing certificate from OSSIGN_CONFIG. Signing during packaging is required
      # for Electron: the inner application executable must be signed *before* it is
      # embedded in the NSIS installer, and the installer is signed afterwards. A
      # separate post-build "sign the .exe" job cannot reach the embedded executable.
      - name: Build and sign application
        run: npm run package
        env:
          ENABLE_SIGNING: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OSSIGN_CONFIG: ${{ secrets.OSSIGN_CONFIG }}

      # Publish the signed artifacts as a release in this (OSSign-hosted) repository.
      # The OSSign API exposes these release assets back to the dispatching workflow
      # in invoke-ai/launcher, which downloads them for the real release.
      - name: Publish signed release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/*.yml
            dist/*.yaml
          name: ${{ github.event.inputs.release_name }}
          tag_name: ${{ github.run_id }}
          body: |
            <img src="https://github.com/ossign.png" alt="OSSign Logo" width="100" height="100" />
            # Signed Windows release: ${{ github.event.inputs.release_name }}

            Signed Windows distributables for ${{ env.SOURCE_REPOSITORY_NAME }}.

            Source: https://github.com/${{ env.SOURCE_REPOSITORY }}@${{ github.event.inputs.source_branch }}
