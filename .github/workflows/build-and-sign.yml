name: Build Signed Artifacts and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_linux:
        description: 'Build for Linux'
        required: false
        default: true
        type: boolean
      build_macos:
        description: 'Build for macOS'
        required: false
        default: true
        type: boolean
      build_windows:
        description: 'Build for Windows'
        required: false
        default: true
        type: boolean

env:
  NODE_VERSION: '22'

permissions:
  contents: write

jobs:
  build-linux:
    if: github.event_name == 'push' || github.event.inputs.build_linux == 'true'
    runs-on: ubuntu-latest
    environment: code-signing
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Generate lockfile hash without version
        id: lockfile-hash
        run: echo "hash=$(node .github/scripts/generate-lockfile-hash.js)" >> $GITHUB_OUTPUT

      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.electron
            ~/.electron-gyp
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-modules-${{ steps.lockfile-hash.outputs.hash }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get UV hash
        id: uv-hash
        run: |
          echo "hash=$(node -e "console.log(require('./package.json').uv.linux.sha256)")" >> $GITHUB_OUTPUT

      - name: Cache UV binaries
        id: cache-uv
        uses: actions/cache@v4
        with:
          path: assets/bin
          key: ${{ runner.os }}-uv-${{ steps.uv-hash.outputs.hash }}

      - name: Download uv
        if: steps.cache-uv.outputs.cache-hit != 'true'
        run: npm run download linux

      - name: Build application
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'linux-artifacts-signed'
          path: |
            dist/*.AppImage
            dist/*.appimage
            dist/*.blockmap
            dist/*.yml
            dist/*.yaml
          retention-days: 90

  build-macos:
    if: github.event_name == 'push' || github.event.inputs.build_macos == 'true'
    runs-on: macos-latest
    environment: code-signing
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Generate lockfile hash without version
        id: lockfile-hash
        run: echo "hash=$(node .github/scripts/generate-lockfile-hash.js)" >> $GITHUB_OUTPUT

      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.electron
            ~/.electron-gyp
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-modules-${{ steps.lockfile-hash.outputs.hash }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get UV hash
        id: uv-hash
        run: |
          echo "hash=$(node -e "console.log(require('./package.json').uv.mac.sha256)")" >> $GITHUB_OUTPUT

      - name: Cache UV binaries
        id: cache-uv
        uses: actions/cache@v4
        with:
          path: assets/bin
          key: ${{ runner.os }}-uv-${{ steps.uv-hash.outputs.hash }}

      - name: Download uv
        if: steps.cache-uv.outputs.cache-hit != 'true'
        run: npm run download mac

      - name: Import macOS certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_FILE_B64 }}
          p12-password: ${{ secrets.APPLE_CERT_FILE_PASSWORD }}

      - name: Build and sign application
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'macos-artifacts-signed'
          path: |
            dist/*.dmg
            dist/*.DMG
            dist/*.zip
            dist/*.ZIP
            dist/*.blockmap
            dist/*.yml
            dist/*.yaml
          retention-days: 90

  # Windows builds are produced and code-signed by OSSign's hosted infrastructure
  # (https://ossign.org); the signing certificate never enters this repository. We
  # dispatch a build+sign request to OSSign, which checks out this repo at the current
  # ref, builds the NSIS installer and signs it, then publishes the signed files. We
  # wait for completion, download the signed artifacts, and re-upload them under the
  # same `windows-artifacts-signed` name the rest of the release flow expects.
  #
  # The OSSign-side workflow lives in OSSign/invoke-ai-launcher; the version we maintain
  # for it, plus setup instructions, are checked in under .github/ossign/.
  build-windows:
    if: github.event_name == 'push' || github.event.inputs.build_windows == 'true'
    runs-on: ubuntu-latest
    environment: code-signing
    # Building + signing on OSSign's infrastructure can take a while; allow for it.
    timeout-minutes: 90

    steps:
      - name: Dispatch build & sign to OSSign and wait for signed artifacts
        id: ossign
        # Pinned to a commit SHA (not a mutable @main) — this action receives OSSIGN_TOKEN,
        # so a moving ref is a supply-chain risk. Bump deliberately (e.g. via Dependabot).
        uses: ossign/actions/workflow/dispatch@fbf0b39466d9409f05d1efc0e58cc3e4615ac625 # OSSign/actions main @ 2025-10-09
        with:
          # OSSign maps these credentials to the OSSign/invoke-ai-launcher repo and
          # triggers its "Build and Sign" workflow. The source ref is taken from the
          # current ref of this workflow run (the pushed tag or dispatched branch).
          username: ${{ secrets.OSSIGN_USER }}
          token: ${{ secrets.OSSIGN_TOKEN }}
          # dispatch_only defaults to false: block until signing completes and expose
          # the signed release assets via the `signed_artifacts` output.

      - name: Download signed Windows artifacts
        env:
          SIGNED_ARTIFACTS: ${{ steps.ossign.outputs.signed_artifacts }}
        run: |
          set -euo pipefail
          mkdir -p dist
          if [ -z "${SIGNED_ARTIFACTS:-}" ] || [ "${SIGNED_ARTIFACTS}" = "[]" ]; then
            echo "::error::OSSign returned no signed artifacts"
            exit 1
          fi
          echo "${SIGNED_ARTIFACTS}" | jq -r '.[] | [.name, .browser_download_url] | @tsv' \
            | while IFS=$'\t' read -r name url; do
                echo "Downloading signed artifact: ${name}"
                curl -fSL "${url}" -o "dist/${name}"
              done
          echo "Downloaded signed artifacts:"
          ls -l dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'windows-artifacts-signed'
          path: |
            dist/*.exe
            dist/*.EXE
            dist/*.blockmap
            dist/*.yml
            dist/*.yaml
          retention-days: 90
